# vim:fileencoding=utf-8:foldmethod=marker
linux_display_server x11
hide_window_decorations no

# Use xterm-256color to ensure Tab/C-i separation works via terminfo
term xterm-256color

font_family      CaskaydiaCove NF
font_size        11.0
cursor_shape     block
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# Disable shell_integration if it's highjacking your Tab key
shell_integration disabled

#: Keyboard shortcuts {{{
kitty_mod           ctrl+shift
clear_all_shortcuts yes

map kitty_mod+c      copy_to_clipboard
map kitty_mod+v      paste_from_clipboard
map ctrl+c           copy_or_interrupt

# --- Navigation Fix (The Bridge) ---

# 1. Force the physical TAB key to send the standard TAB byte (Hex 09)
map tab send_text all \x09

# 2. Force Ctrl+I to send a unique extended sequence that Tmux will catch
map ctrl+i send_text all \x1b[105;5u

# 3. Handle Enter/Ctrl+M separately just in case
map ctrl+m send_text all \x0d
#: }}}

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

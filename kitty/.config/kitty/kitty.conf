# ==============================================================================
# KITTY CONFIGURATION
# ==============================================================================

# --- General ------------------------------------------------------------------
linux_display_server    x11
hide_window_decorations no
term                    xterm-256color
shell_integration       disabled
allow_remote_control    yes

# --- Fonts --------------------------------------------------------------------
font_family             CaskaydiaCove NF
bold_font               auto
italic_font             auto
bold_italic_font        auto
font_size               11.0
disable_ligatures       never

# --- Cursor -------------------------------------------------------------------
cursor_shape            block
cursor_blink_interval   0

# --- Scrollback ---------------------------------------------------------------
scrollback_lines        10000
wheel_scroll_multiplier 5.0

# --- Window Layout ------------------------------------------------------------
window_padding_width    4
confirm_os_window_close 0

# --- Performance --------------------------------------------------------------
repaint_delay           10
input_delay             3
sync_to_monitor         yes

# --- Bell ---------------------------------------------------------------------
enable_audio_bell       no
visual_bell_duration    0.0
window_alert_on_bell    no

# --- Keyboard Shortcuts -------------------------------------------------------
kitty_mod               ctrl+shift
clear_all_shortcuts     yes

# Clipboard
map kitty_mod+c         copy_to_clipboard
map kitty_mod+v         paste_from_clipboard
map ctrl+c              copy_or_interrupt

# --- Navigation Fix (The Bridge) ----------------------------------------------
# These ensure Tab and Ctrl+I are distinct when passing through to Tmux/Vim.
# 1. Force physical TAB key to send standard TAB (Hex 09)
map tab                 send_text all \x09

# 2. Force Ctrl+I to send unique extended sequence (\x1b[105;5u)
map ctrl+i              send_text all \x1b[105;5u

# 3. Handle Enter/Ctrl+M separately to prevent ambiguity
map ctrl+m              send_text all \x0d

# --- Theme --------------------------------------------------------------------
# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

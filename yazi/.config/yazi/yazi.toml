# ~/.config/yazi/yazi.toml

[manager]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "size"

[preview]
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [{ run = '${EDITOR:-vi} "$@"', desc = "Edit", block = true }]
open = [{ run = 'xdg-open "$@"', desc = "Open" }]

[open]
rules = [
  { name = "*/", use = [
    "edit",
    "open",
  ] },
  { name = "*", use = [
    "edit",
    "open",
  ] },
]

# ==============================================================================
# TMUX CONFIGURATION
# ==============================================================================

# --- General Options ----------------------------------------------------------
set -g default-terminal "tmux-256color"
set -g default-shell "/usr/bin/fish"
set -g mouse on
set -g status-position top
set -g focus-events on           # Support focus events for terminals/vim
set -g history-limit 10000       # Increase scrollback buffer
set -g base-index 1              # Start windows at 1
set -g pane-base-index 1         # Start panes at 1
set-window-option -g pane-base-index 1
set -g renumber-windows on       # Renumber windows when one is closed
set -s escape-time 0             # Address vim mode switching delay
set -s extended-keys off         # Prevent Tab/C-i conflicts in Kitty

# Ensure RGB/TrueColor works
set -as terminal-overrides ',xterm-kitty:RGB'
set -as terminal-overrides ',xterm-kitty:Tc'
set -as terminal-features 'xterm-kitty:clipboard:RGB'

# --- Key Bindings -------------------------------------------------------------
# Change prefix to C-t (Colemak friendly)
unbind C-b
set -g prefix C-t
bind C-t send-prefix
bind C-t last-window

# Config management
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind $ command-prompt -I "#W" { rename-window "%%" }

# Application Popups
bind C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind C-f display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"

# Window/Pane Management (Opening in same path)
bind c new-window -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# Window Navigation
bind n next-window
bind e previous-window
bind -n C-left  prev
bind -n C-right next
bind -n S-left  swap-window -t -1
bind -n S-right swap-window -t +1

# --- Navigation Bridge (Vim/Tmux) ---------------------------------------------
# Logic: If in Vim, pass the key. Otherwise, move Tmux pane.
# Note: Uses C-o for Right to avoid C-i/Tab conflict.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-n' if-shell "$is_vim" 'send-keys C-n' 'select-pane -D'
bind-key -n 'C-e' if-shell "$is_vim" 'send-keys C-e' 'select-pane -U'
bind-key -n 'C-o' if-shell "$is_vim" 'send-keys C-i' 'select-pane -R'

# --- Copy Mode (Colemak) ------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi y      send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind P paste-buffer -p

# Navigation in Copy Mode
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi n send-keys -X cursor-down
bind -T copy-mode-vi e send-keys -X cursor-up
bind -T copy-mode-vi i send-keys -X cursor-right

# Use sesh
bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^z zoxide ^d tmuxinator ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-z:change-prompt(📂  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(sesh list -f)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""
# Overwrite default L to switch between sessions instead of windows
bind -N "last-session (via sesh)" I run-shell "sesh last"

# --- Tokyo Night Theme --------------------------------------------------------
# Colors
set -g mode-style "fg=#7aa2f7,bg=#3b4261"
set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
set -g window-style 'bg=#24283b'
set -g window-active-style 'bg=#1a1b26'
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Status Bar
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#7aa2f7,bg=#16161e"
set -g status-left-length "100"
set -g status-right-length "100"

# Status Content
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,none]"
set -g status-right "#[fg=#16161e,bg=#16161e,none]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#3b4261,bg=#16161e,none]#[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#3b4261,none]#[fg=#15161e,bg=#7aa2f7,bold] #h "

# --- Plugins ------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

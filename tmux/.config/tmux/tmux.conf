# vim: fdm=marker

# Better prefix key for Colemak
set -g default-terminal "tmux-256color"
set-option -g default-shell "/usr/bin/fish"
set -g prefix C-t
bind t send-prefix
bind C-t last-window

# Ensure RGB/TrueColor works in Kitty
set -as terminal-overrides ',xterm-kitty:RGB'
set -as terminal-overrides ',xterm-kitty:Tc'

# CRITICAL: Disable extended keys to prevent Tab from being swallowed
set -s extended-keys off
set -as terminal-features 'xterm-kitty:clipboard:RGB'

set -g mouse on
set -g status-position top

# {{{ Main bindings
bind $ command-prompt -I "#W" { rename-window "%%" }
bind z source-file ~/.config/tmux/tmux.conf
bind C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
# }}}

# {{{ Windows/Tabs
bind c new-window
bind n next-window
bind e previous-window
bind -n C-left  prev
bind -n C-right next
bind -n S-left  swap-window -t -1
bind -n S-right swap-window -t +1
# }}}

# {{{ Panes
bind h split-window -h
bind v split-window -v
# }}}

# {{{ Copy and paste
setw -g mode-keys vi
bind -T copy-mode-vi v      send-keys      -X  begin-selection
bind -T copy-mode-vi y      send-keys      -X  copy-pipe-and-cancel
bind P paste-buffer -p
bind -T copy-mode-vi MouseDragEnd1Pane send-keys      -X  copy-pipe-and-cancel
bind -T copy-mode-vi h      send-keys      -X  cursor-left
bind -T copy-mode-vi n      send-keys      -X  cursor-down
bind -T copy-mode-vi e      send-keys      -X  cursor-up
bind -T copy-mode-vi i      send-keys      -X  cursor-right
# }}}

# {{{ Navigation Bridge (The Fix)
# Logic: If in Vim, pass the raw C-i code. Otherwise, move Tmux pane right.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Standard Vim-Tmux-Navigator bindings for others
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-n' if-shell "$is_vim" 'send-keys C-n' 'select-pane -D'
bind-key -n 'C-e' if-shell "$is_vim" 'send-keys C-e' 'select-pane -U'
bind-key -n 'C-o' if-shell "$is_vim" 'send-keys C-i' 'select-pane -R'
# }}}

# {{{ Tokyo Night theme
set -g mode-style "fg=#7aa2f7,bg=#3b4261"
set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
set -g window-style 'bg=#24283b'
set -g window-active-style 'bg=#1a1b26'
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#7aa2f7,bg=#16161e"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "
# }}}

# {{{ Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# We manage navigation manually above to fix the C-i/Tab issue
run '~/.config/tmux/plugins/tpm/tpm'
# }}}
